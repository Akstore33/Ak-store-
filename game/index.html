<!DOCTYPE html>
<html>
<head>
<title>My Game</title>
</head>
<body style="text-align:center;">
<h1>Click Game 🎮</h1>
<p id="score">Score: 0</p>
<button onclick="add()">Click Me</button>

<script>
let score = 0;
function add(){
  score++;
  document.getElementById("score").innerText = "Score: " + score;
}
</script>
</body>
</html>
